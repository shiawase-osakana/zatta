<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');
        
        :root {
            --nature-green: #2dd4bf;
            --nature-blue: #38bdf8;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: #f8fafc;
            color: #334155;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 風に揺らぐ背景の演出 */
        .wind-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, #e0f2fe 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #f0fdf4 0%, transparent 50%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.1); }
        }

        .glass-item {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.6);
        }

        .nav-text {
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-8">

    <div class="wind-bg"></div>
    <div class="orb w-64 h-64 bg-teal-200 top-1/4 -left-20"></div>
    <div class="orb w-72 h-72 bg-sky-200 bottom-1/4 -right-20" style="animation-delay: -5s;"></div>

    <!-- Header -->
    <header class="mb-16 text-center">
        <div class="inline-block p-4 mb-6 rounded-full bg-white/30 backdrop-blur-md border border-white/50 shadow-sm">
            <i data-lucide="wind" class="w-8 h-8 text-teal-500/80"></i>
        </div>
        <h1 class="text-3xl font-light tracking-[0.3em] uppercase text-slate-800">
            MTG <span class="font-medium text-teal-600/80">Tools</span>
        </h1>
        <div class="w-12 h-[1px] bg-teal-200 mx-auto mt-4"></div>
    </header>

    <!-- Navigation -->
    <main class="w-full max-w-xs space-y-4">
        
        <a href="/lifecounter.html" class="glass-item group flex items-center p-5 rounded-3xl shadow-sm">
            <div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-teal-50 text-teal-500 group-hover:scale-110 transition-transform">
                <i data-lucide="heart" class="w-6 h-6"></i>
            </div>
            <span class="ml-6 text-base font-normal nav-text text-slate-600">ライフカウンター</span>
            <i data-lucide="chevron-right" class="ml-auto w-4 h-4 text-slate-300"></i>
        </a>

        <a href="/initiative.html" class="glass-item group flex items-center p-5 rounded-3xl shadow-sm">
            <div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-sky-50 text-sky-500 group-hover:scale-110 transition-transform">
                <i data-lucide="compass" class="w-6 h-6"></i>
            </div>
            <span class="ml-6 text-base font-normal nav-text text-slate-600">イニシアチブ</span>
            <i data-lucide="chevron-right" class="ml-auto w-4 h-4 text-slate-300"></i>
        </a>

        <a href="/stickergoblin.html" class="glass-item group flex items-center p-5 rounded-3xl shadow-sm">
            <div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-emerald-50 text-emerald-500 group-hover:scale-110 transition-transform">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </div>
            <span class="ml-6 text-base font-normal nav-text text-slate-600">ステッカーゴブリン</span>
            <i data-lucide="chevron-right" class="ml-auto w-4 h-4 text-slate-300"></i>
        </a>

    </main>

    <!-- Footer decoration -->
    <footer class="mt-24">
        <p class="text-[10px] tracking-[0.5em] uppercase text-slate-400 font-light">Ethereal Interface</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
